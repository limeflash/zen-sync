name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile check
        run: python -m py_compile server/main.py
      - name: Install dependencies
        run: pip install -r server/requirements.txt
      - name: Install audit tools
        run: pip install bandit pip-audit
      - name: Bandit (medium+ severity)
        run: bandit -r server -q -ll
      - name: pip-audit
        run: pip-audit -r server/requirements.txt

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check (client module)
        run: |
          node --check client/modules/ZenSyncService.sys.mjs
          node --check client/preferences/zenSyncSettings.js
